<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>手旗動作對照遊戲</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 600px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    .options button {
      font-size: 18px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background-color: #e2e8f0;
      cursor: pointer;
    }
    .options button:hover {
      background-color: #cbd5e1;
    }
    .info {
      margin-top: 15px;
      font-size: 16px;
    }
    .mode-buttons button {
      margin: 10px 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background-color: #3b82f6;
      color: white;
    }
    .question {
      font-size: 22px;
      margin-top: 20px;
      font-weight: bold;
      color: #1e293b;
    }
    .correct-answer {
      margin-top: 20px;
      font-size: 18px;
      color: #dc2626;
    }
    #rememberBtn {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>手旗動作對照遊戲</h1>
    <div class="mode-buttons">
      <button onclick="startGame('motion')">玩法一：出動作選字母</button>
      <button onclick="startGame('letter')">玩法二：出字母選動作</button>
    </div>
    <div id="questionArea"></div>
    <div class="options" id="optionsArea"></div>
    <div class="info" id="infoArea"></div>
    <div class="correct-answer" id="correctAnswerArea"></div>
    <button id="rememberBtn" onclick="nextQuestion()">我記住了</button>
  </div>

  <script>
    const flagMap = {
      A: "左手預備右手右下", B: "左手預備右手平舉", C: "左手預備右手右上",
      D: "左手預備右手直胸", E: "右手預備左手左上", F: "右手預備左手平舉",
      G: "右手預備左手左下", H: "右手平舉左手右下", I: "右手右上左手右下",
      J: "右手直胸左手平舉", K: "右手右下左手直胸", L: "右手右下左手左上",
      M: "右手右下左手平舉", N: "右手右下左手左下", O: "右手右上左手平胸",
      P: "右手平舉左手直胸", Q: "右手平舉左手左上", R: "右手平舉左手平舉",
      S: "右手平舉左手左下", T: "右手右上左手直胸", U: "右手右上左手左上",
      V: "右手直胸左手左下", W: "右手平胸左手左上", X: "右手左下左手左上",
      Y: "右手右上左手平舉", Z: "右手左下左手平舉"
    };

    let mode = '';
    let answer = '';
    let timer;
    let timeLeft = 10;
    let score = 0;
    let total = 0;
    let paused = false;

    function startGame(selectedMode) {
      mode = selectedMode;
      score = 0;
      total = 0;
      nextQuestion();
    }

    function nextQuestion() {
      clearInterval(timer);
      paused = false;
      document.getElementById("correctAnswerArea").innerText = "";
      document.getElementById("rememberBtn").style.display = "none";

      const keys = Object.keys(flagMap);
      answer = keys[Math.floor(Math.random() * keys.length)];
      const correct = mode === 'motion' ? answer : flagMap[answer];

      let options = [correct];
      while (options.length < 3) {
        const rand = keys[Math.floor(Math.random() * keys.length)];
        const opt = mode === 'motion' ? rand : flagMap[rand];
        if (!options.includes(opt)) options.push(opt);
      }
      options = options.sort(() => Math.random() - 0.5);

      const questionText = mode === 'motion' ? flagMap[answer] : answer;

      document.getElementById("questionArea").innerHTML = `<div class='question'>${questionText}</div>`;
      document.getElementById("optionsArea").innerHTML = options.map(opt =>
        `<button onclick="selectAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</button>`
      ).join('');

      timeLeft = 10;
      updateTimer();
      timer = setInterval(() => {
        if (!paused) {
          timeLeft--;
          updateTimer();
          if (timeLeft <= 0) {
            clearInterval(timer);
            showCorrectAnswer();
          }
        }
      }, 1000);
    }

    function updateTimer() {
      document.getElementById("infoArea").innerText = `剩下 ${timeLeft} 秒｜目前答對 ${score} / ${total}`;
    }

    function selectAnswer(choice) {
      if (paused) return;
      clearInterval(timer);
      const correct = mode === 'motion' ? answer : flagMap[answer];
      total++;
      if (choice === correct) {
        score++;
        nextQuestion();
      } else {
        showCorrectAnswer();
      }
    }

    function showCorrectAnswer() {
      paused = true;
      const correct = mode === 'motion' ? answer : flagMap[answer];
      document.getElementById("correctAnswerArea").innerText = `答錯了！正確答案是：${correct}`;
      document.getElementById("rememberBtn").style.display = "inline-block";
      updateTimer();
    }
  </script>
</body>
</html>
