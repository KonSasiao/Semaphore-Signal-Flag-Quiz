<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semaphore Signal Flag Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f4f8;
    }
    h1 {
      margin-top: 20px;
    }
    #mode-selection {
      margin-top: 20px;
    }
    #letter-display, #image-question {
      font-size: 3em;
      margin-top: 10px;
    }
    #choices-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .choice-image, #correct-image, .image-question-img {
      width: 120px;
      height: auto;
      cursor: pointer;
      border: 3px solid transparent;
      border-radius: 10px;
      transition: transform 0.2s, border 0.2s;
    }
    .choice-image:hover {
      transform: scale(1.05);
      border: 3px solid #4CAF50;
    }
    #feedback {
      font-size: 1.2em;
      margin-top: 20px;
    }
    #remember-button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1em;
      display: none;
    }
    #timer {
      font-size: 1.2em;
      margin-top: 10px;
      color: #d32f2f;
    }
    #correct-container {
      margin-top: 15px;
    }
    .mode-btn {
      margin: 5px;
      padding: 10px 15px;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <h1>Semaphore Signal Flag Quiz</h1>
  <div id="mode-selection">
    <button class="mode-btn" onclick="setMode('letter-to-image')">Letter ➜ Image</button>
    <button class="mode-btn" onclick="setMode('image-to-letter')">Image ➜ Letter</button>
  </div>
  <div id="question">Choose the matching flag position:</div>
  <div id="letter-display"></div>
  <div id="image-question"></div>
  <div id="timer"></div>
  <div id="choices-container"></div>
  <div id="feedback"></div>
  <div id="correct-container"></div>
  <button id="remember-button" onclick="startNextRound()">I Got It!</button>

  <script>
    const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    let currentAnswer = '';
    let timerInterval;
    let timeLeft = 5;
    let roundLocked = false;
    let gameMode = 'letter-to-image';

    function setMode(mode) {
      gameMode = mode;
      document.getElementById('mode-selection').style.display = 'none';
      startNextRound();
    }

    function getRandomChoices(answer, count = 4) {
      const shuffled = allLetters.filter(l => l !== answer).sort(() => 0.5 - Math.random());
      const result = shuffled.slice(0, count - 1);
      result.push(answer);
      return result.sort(() => 0.5 - Math.random());
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 5;
      document.getElementById('timer').innerText = `⏳ ${timeLeft} seconds left`;
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `⏳ ${timeLeft} seconds left`;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeout();
        }
      }, 1000);
    }

    function startNextRound() {
      document.getElementById('feedback').innerText = '';
      document.getElementById('correct-container').innerHTML = '';
      document.getElementById('remember-button').style.display = 'none';
      document.getElementById('letter-display').innerText = '';
      document.getElementById('image-question').innerHTML = '';
      roundLocked = false;

      currentAnswer = allLetters[Math.floor(Math.random() * allLetters.length)];
      const choices = getRandomChoices(currentAnswer);

      const container = document.getElementById('choices-container');
      container.innerHTML = '';

      if (gameMode === 'letter-to-image') {
        document.getElementById('letter-display').innerText = currentAnswer;
        choices.forEach(letter => {
          const img = document.createElement('img');
          img.src = `${letter}.png`;
          img.alt = `Flag ${letter}`;
          img.classList.add('choice-image');
          img.onclick = () => handleChoice(letter);
          container.appendChild(img);
        });
      } else if (gameMode === 'image-to-letter') {
        const questionImg = document.createElement('img');
        questionImg.src = `${currentAnswer}.png`;
        questionImg.alt = `Question Image`;
        questionImg.classList.add('image-question-img');
        document.getElementById('image-question').appendChild(questionImg);

        choices.forEach(letter => {
          const btn = document.createElement('button');
          btn.innerText = letter;
          btn.classList.add('mode-btn');
          btn.onclick = () => handleChoice(letter);
          container.appendChild(btn);
        });
      }

      startTimer();
    }

    function showCorrectAnswerImage() {
      const container = document.getElementById('correct-container');
      container.innerHTML = `<div>✅ Correct Answer:</div><img id="correct-image" src="${currentAnswer}.png" alt="Correct Flag">`;
    }

    function handleChoice(selected) {
      if (roundLocked) return;
      clearInterval(timerInterval);
      roundLocked = true;

      const feedback = document.getElementById('feedback');
      if (selected === currentAnswer) {
        feedback.innerText = '✅ Correct!';
        setTimeout(startNextRound, 800);
      } else {
        feedback.innerText = `❌ Wrong!`;
        showCorrectAnswerImage();
        document.getElementById('remember-button').style.display = 'inline-block';
      }
    }

    function handleTimeout() {
      roundLocked = true;
      document.getElementById('feedback').innerText = `⏰ Time's up!`;
      showCorrectAnswerImage();
      document.getElementById('remember-button').style.display = 'inline-block';
    }
  </script>
</body>
</html>
